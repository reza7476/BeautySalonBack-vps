name: Build .NET Project

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      # Checkout Source Code
      - name: Checkout source
        uses: actions/checkout@v4

      # Install .NET SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore NuGet Packages
      - name: Restore
        run: dotnet restore SaharBeautySalonBack.sln

      # Build Solution
      - name: Build
        run: dotnet build SaharBeautySalonBack.sln --configuration Release --no-restore

      # Publish API
      - name: Publish API
        run: |
          dotnet publish src/03.RestApi/BeautySalon.RestApi/BeautySalon.RestApi.csproj \
            --configuration Release \
            --no-build \
            -o publish

      # Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker Image
      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/beauty-api:latest \
            .

      # Push Docker Image
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/beauty-api:latest